    Experience:
      - company: Northwestern Polytechnical University
        position: Graduate Researcher
        location: Xi'an, China
        start_date: 2023-09
        end_date: 2026-06
        highlights:
          - Designed a three-stream distortion-aware BIQA framework fusing 138-dimensional NSS features with SigLIP and CLIP-H via a multiplicative gating network.
          - Developed MVG-SDI and MVG-Spa, two independent NR quality metrics for pansharpened satellite imagery.
          - Built MVG-VQA, a no-reference VQA system fusing spatial MVG features with temporal features using XGBoost regression.

